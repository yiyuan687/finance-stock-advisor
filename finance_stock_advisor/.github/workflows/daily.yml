name: 每日财经推荐

# 触发方式: 仅 workflow_dispatch (手动/API 触发)
# 用 cron-job.org 每天 08:00 准时调用 GitHub API 触发，避免 GitHub schedule 延迟
on:
  workflow_dispatch:

jobs:
  advisor:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 安装 Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 抓取新闻 + 推荐 + 推送钉钉
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET:  ${{ secrets.DINGTALK_SECRET }}
        run: python finance_stock_advisor.py --now
